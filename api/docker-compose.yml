services:
  postgres:
    image: postgres:17-alpine
    container_name: todo-bmad-api-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: todo_bmad_api
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d todo_bmad_api']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
